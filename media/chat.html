<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}'; img-src data:; connect-src ws://localhost:*;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{cssUri}}" />
  <title>Argus</title>
</head>
<body style="background:var(--vscode-editor-background,#1e1e1e);overflow:hidden">
  <div id="root"><div class="app-loader"><div class="app-spinner"></div></div></div>
  <div id="dev-harness"></div>
  <style nonce="{{nonce}}">
    .app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--vscode-editor-background, #1e1e1e);
    }
    .app-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--vscode-panel-border, #474747);
      border-top-color: var(--vscode-button-background, #0e639c);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script nonce="{{nonce}}">
    // WebSocket bridge: route Claude-related messages over WS,
    // VS Code-specific messages stay on postMessage
    (function() {
      var WS_URL = '{{wsUrl}}';
      if (!WS_URL) return; // no server available

      var VS_ONLY = { openFile: 1, openUrl: 1, focusPanel: 1, getInfo: 1, readFilePreview: 1 };
      var realApi = acquireVsCodeApi();
      var ws;
      var queue = [];
      var ready = false;
      var reconnectTimer;
      var attempt = 0;
      var DELAYS = [1000, 2000, 4000, 8000, 10000];

      function dispatch(data) {
        window.dispatchEvent(new MessageEvent('message', { data: data }));
      }

      function scheduleReconnect() {
        clearTimeout(reconnectTimer);
        var delay = DELAYS[Math.min(attempt, DELAYS.length - 1)];
        attempt++;
        console.warn('[argus-ws] reconnecting in ' + delay + 'ms (attempt ' + attempt + ')');
        reconnectTimer = setTimeout(connect, delay);
      }

      function connect() {
        if (ws) {
          ws.onopen = ws.onclose = ws.onmessage = ws.onerror = null;
          try { ws.close(); } catch(e) {}
        }
        ws = new WebSocket(WS_URL);

        ws.onopen = function() {
          ready = true;
          attempt = 0;
          dispatch({ type: 'ws_status', connected: true });
          queue.splice(0).forEach(function(m) { ws.send(JSON.stringify(m)); });
        };

        ws.onmessage = function(event) {
          dispatch(JSON.parse(event.data));
        };

        ws.onerror = function(e) { console.error('[argus-ws] error', e); };

        ws.onclose = function() {
          ready = false;
          dispatch({ type: 'ws_status', connected: false });
          scheduleReconnect();
        };
      }

      connect();

      // Reconnect when tab becomes visible (catches sleep/resume)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && !ready) {
          clearTimeout(reconnectTimer);
          attempt = 0;
          connect();
        }
      });

      // Listen for extension->webview messages that need forwarding to WS
      window.addEventListener('message', function(event) {
        var data = event.data;
        if (data && data.type === 'newSession') {
          if (ready) ws.send(JSON.stringify({ type: 'newSession' }));
          else queue.push({ type: 'newSession' });
        }
      });

      // Override acquireVsCodeApi so the React app uses our proxy
      window.acquireVsCodeApi = function() {
        return {
          postMessage: function(msg) {
            if (msg && VS_ONLY[msg.type]) {
              realApi.postMessage(msg);
            } else if (ready) {
              ws.send(JSON.stringify(msg));
            } else {
              queue.push(msg);
            }
          }
        };
      };
    })();
  </script>
  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
