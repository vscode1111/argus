<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus - Dev</title>
  <style>
    /* VS Code Dark+ theme variables */
    :root {
      --vscode-editor-background: #1e1e1e;
      --vscode-editor-foreground: #d4d4d4;
      --vscode-panel-border: #474747;
      --vscode-input-background: #3c3c3c;
      --vscode-input-foreground: #cccccc;
      --vscode-button-background: #0e639c;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #1177bb;
      --vscode-editor-selectionBackground: #264f7870;
      --vscode-sideBar-background: #252526;
      --vscode-textCodeBlock-background: #2d2d2d;
      --vscode-errorForeground: #f48771;
      --vscode-descriptionForeground: #8c8c8c;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif;
      --vscode-editor-font-family: "Cascadia Code", "Courier New", monospace;
      --vscode-font-size: 13px;
      --vscode-focusBorder: #007fd4;
      --vscode-textLink-foreground: #3794ff;
      --vscode-symbolIcon-functionForeground: #dcdcaa;
    }

    html, body {
      background: var(--vscode-editor-background, #1e1e1e);
      overflow: hidden;
    }
    body {
      padding-bottom: 30px;
    }
  </style>
  <script>
    // Bridge to the argus-agent WebSocket plugin running inside the Vite dev server
    window.acquireVsCodeApi = () => {
      const ws = new WebSocket('ws://localhost:5173/agent');
      const queue = [];
      let ready = false;

      ws.onopen = () => {
        ready = true;
        queue.splice(0).forEach(m => ws.send(JSON.stringify(m)));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        window.dispatchEvent(new MessageEvent('message', { data }));
      };

      ws.onerror = (e) => console.error('[argus-ws] error', e);

      ws.onclose = () => {
        ready = false;
        console.warn('[argus-ws] disconnected');
      };

      return {
        postMessage: (msg) => {
          console.log('[-> agent]', msg);
          if (ready) {
            ws.send(JSON.stringify(msg));
          } else {
            queue.push(msg);
          }
        },
      };
    };
  </script>
</head>

<body class="vscode-dark">
  <div id="root"><div class="app-loader"><div class="app-spinner"></div></div></div>
  <style>
    .app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--vscode-editor-background, #1e1e1e);
    }
    .app-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--vscode-panel-border, #474747);
      border-top-color: var(--vscode-button-background, #0e639c);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <div id="dev-harness"></div>
  <script type="module" src="/src/index.dev.tsx"></script>
</body>

</html>
