<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline'; connect-src ws: wss: http: https:; img-src data: 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/argus-icon.ico" type="image/x-icon" />
  <title>Argus - Dev</title>
  <style>
    /* VS Code Dark 2026 theme variables */
    :root {
      --vscode-editor-background: #121314;
      --vscode-editor-foreground: #BBBEBF;
      --vscode-panel-border: #2A2B2CFF;
      --vscode-input-background: #191A1B;
      --vscode-input-foreground: #bfbfbf;
      --vscode-button-background: #297AA0;
      --vscode-button-foreground: #FFFFFF;
      --vscode-button-hoverBackground: #2B7DA3;
      --vscode-editor-selectionBackground: #276782dd;
      --vscode-sideBar-background: #191A1B;
      --vscode-textCodeBlock-background: #242526;
      --vscode-errorForeground: #f48771;
      --vscode-descriptionForeground: #8C8C8C;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif;
      --vscode-editor-font-family: "Cascadia Code", "Courier New", monospace;
      --vscode-font-size: 13px;
      --vscode-focusBorder: #3994BCB3;
      --vscode-textLink-foreground: #48A0C7;
      --vscode-symbolIcon-functionForeground: #d2a8ff;
      --vscode-scrollbarSlider-background: #83848533;
    }

    html, body {
      background: var(--vscode-editor-background, #1e1e1e);
      overflow: hidden;
    }
  </style>
  <!-- Shared bridge factory + dev shim. Classic scripts from /public so they run
       before the deferred React entry, which calls acquireVsCodeApi() on mount. -->
  <script src="/ws-bridge.js"></script>
  <script>
    // Dev-mode shim: connect to the Vite-hosted agent backend on :3001, refreshing
    // the nonce via XHR before each connect (it rotates on server restart). Only the
    // URL resolution and mock-suppression are dev-specific; reconnect/queue live in
    // ws-bridge.js (createArgusBridge).
    window.acquireVsCodeApi = function () {
      var params = new URLSearchParams(window.location.search);
      var dir = params.get('dir');
      var nonce = params.get('nonce');
      // ?mock=1 isolates e2e mock tests: do not forward these data-query messages to
      // the live dev backend (their async replies would clobber injected mock data).
      var mock = params.get('mock') === '1';
      var MOCK_SUPPRESSED = { getSkills: 1, listSessions: 1 };
      // Derive host from the page so a LAN device reaches the dev machine, not its own localhost.
      var host = window.location.hostname || 'localhost';

      function refreshNonce() {
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', 'http://' + host + ':3001/nonce', false);
          xhr.send();
          if (xhr.status === 200 && xhr.responseText) nonce = xhr.responseText;
        } catch (e) {}
      }
      function nextUrl() {
        refreshNonce();
        var p = new URLSearchParams();
        if (nonce) p.set('nonce', nonce);
        if (dir) p.set('dir', dir);
        return 'ws://' + host + ':3001/agent?' + p.toString();
      }

      var bridge = window.createArgusBridge({ nextUrl: nextUrl });
      return {
        postMessage: function (msg) {
          if (msg && msg.type === 'switchWorkspace') { dir = msg.dir; bridge.reconnectNow(); return; }
          if (mock && msg && MOCK_SUPPRESSED[msg.type]) { console.log('[mock] suppressed', msg.type); return; }
          console.log('[-> agent]', msg);
          bridge.post(msg);
        }
      };
    };
  </script>
</head>

<body class="vscode-dark">
  <div id="root"><div class="app-loader"><div class="app-spinner"></div></div></div>
  <style>
    .app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--vscode-editor-background, #1e1e1e);
    }
    .app-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--vscode-panel-border, #474747);
      border-top-color: var(--vscode-button-background, #0e639c);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <div id="dev-harness"></div>
  <script type="module" src="/src/index.dev.tsx"></script>
</body>

</html>
