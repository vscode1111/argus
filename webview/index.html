<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline'; connect-src ws: wss: http: https:; img-src data: 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/argus-icon.ico" type="image/x-icon" />
  <title>Argus - Dev</title>
  <style>
    /* VS Code Dark 2026 theme variables */
    :root {
      --vscode-editor-background: #121314;
      --vscode-editor-foreground: #BBBEBF;
      --vscode-panel-border: #2A2B2CFF;
      --vscode-input-background: #191A1B;
      --vscode-input-foreground: #bfbfbf;
      --vscode-button-background: #297AA0;
      --vscode-button-foreground: #FFFFFF;
      --vscode-button-hoverBackground: #2B7DA3;
      --vscode-editor-selectionBackground: #276782dd;
      --vscode-sideBar-background: #191A1B;
      --vscode-textCodeBlock-background: #242526;
      --vscode-errorForeground: #f48771;
      --vscode-descriptionForeground: #8C8C8C;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif;
      --vscode-editor-font-family: "Cascadia Code", "Courier New", monospace;
      --vscode-font-size: 13px;
      --vscode-focusBorder: #3994BCB3;
      --vscode-textLink-foreground: #48A0C7;
      --vscode-symbolIcon-functionForeground: #d2a8ff;
      --vscode-scrollbarSlider-background: #83848533;
    }

    html, body {
      background: var(--vscode-editor-background, #1e1e1e);
      overflow: hidden;
    }
    body.dev-harness-visible {
      padding-bottom: 30px;
    }
  </style>
  <script>
    // Bridge to the argus-agent WebSocket plugin running inside the Vite dev server
    window.acquireVsCodeApi = () => {
      const _params = new URLSearchParams(window.location.search);
      const _dir = _params.get('dir');
      let _nonce = _params.get('nonce');
      let _wsUrl = null;

      // Derive the backend host from the page so LAN devices (e.g. a phone on
      // the same WiFi) reach the dev machine instead of their own localhost.
      const _host = window.location.hostname || 'localhost';

      function buildWsUrl() {
        const p = new URLSearchParams();
        if (_nonce) p.set('nonce', _nonce);
        if (_dir) p.set('dir', _dir);
        _wsUrl = 'ws://' + _host + ':3001/agent?' + p.toString();
      }

      if (!_nonce) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'http://' + _host + ':3001/nonce', false);
        try { xhr.send(); if (xhr.status === 200) _nonce = xhr.responseText; } catch(e) {}
      }
      buildWsUrl();
      let ws;
      const queue = [];
      let ready = false;
      let reconnectTimer;
      let attempt = 0;
      const DELAYS = [1000, 2000, 4000, 8000, 10000];

      function dispatch(data) {
        window.dispatchEvent(new MessageEvent('message', { data }));
      }

      function scheduleReconnect() {
        clearTimeout(reconnectTimer);
        const delay = DELAYS[Math.min(attempt, DELAYS.length - 1)];
        attempt++;
        console.warn(`[argus-ws] reconnecting in ${delay}ms (attempt ${attempt})`);
        reconnectTimer = setTimeout(connect, delay);
      }

      function connect() {
        if (ws) {
          ws.onopen = ws.onclose = ws.onmessage = ws.onerror = null;
          try { ws.close(); } catch(e) {}
        }
        ws = new WebSocket(_wsUrl);

        ws.onopen = () => {
          ready = true;
          attempt = 0;
          dispatch({ type: 'ws_status', connected: true });
          queue.splice(0).forEach(m => ws.send(JSON.stringify(m)));
        };

        ws.onmessage = (event) => {
          dispatch(JSON.parse(event.data));
        };

        ws.onerror = (e) => console.error('[argus-ws] error', e);

        ws.onclose = () => {
          ready = false;
          dispatch({ type: 'ws_status', connected: false });
          scheduleReconnect();
        };
      }

      connect();

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && !ready) {
          clearTimeout(reconnectTimer);
          attempt = 0;
          connect();
        }
      });

      return {
        postMessage: (msg) => {
          console.log('[-> agent]', msg);
          if (ready) {
            ws.send(JSON.stringify(msg));
          } else {
            queue.push(msg);
          }
        },
      };
    };
  </script>
</head>

<body class="vscode-dark">
  <div id="root"><div class="app-loader"><div class="app-spinner"></div></div></div>
  <style>
    .app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--vscode-editor-background, #1e1e1e);
    }
    .app-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--vscode-panel-border, #474747);
      border-top-color: var(--vscode-button-background, #0e639c);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <div id="dev-harness"></div>
  <script type="module" src="/src/index.dev.tsx"></script>
</body>

</html>
