<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'nonce-{{nonce}}'; script-src 'nonce-{{nonce}}'; img-src data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{cssUri}}" />
  <title>Argus</title>
</head>
<body style="background:var(--vscode-editor-background,#1e1e1e);overflow:hidden">
  <div id="root"><div class="app-loader"><div class="app-spinner"></div></div></div>
  <style nonce="{{nonce}}">
    .app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--vscode-editor-background, #1e1e1e);
    }
    .app-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--vscode-panel-border, #474747);
      border-top-color: var(--vscode-button-background, #0e639c);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
